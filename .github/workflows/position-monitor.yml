name: Position Monitor (Pushover Alerts)

on:
  schedule:
    # Every 15 min during market hours: 9:30 AM - 4:00 PM ET
    # = 13:30 - 20:00 UTC (EST) or 14:30 - 21:00 UTC (EDT)
    # Using conservative range covering both
    - cron: '*/15 13-21 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests numpy pandas supabase yfinance

      - name: Monitor positions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: python3 monitor_positions.py
