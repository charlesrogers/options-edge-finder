name: Investigate H03 + Train Bayesian
on:
  workflow_dispatch:

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install supabase pandas numpy scipy requests
      - name: Investigate H03 + Train Bayesian
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 investigate_h03.py
