name: Daily Monitoring
on:
  schedule:
    # Run at 10 PM ET weekdays (02:00 UTC) — after scoring completes
    - cron: '0 2 * * 2-6'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install supabase pandas numpy scipy requests
      - name: Run monitoring stack
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 monitoring.py
