name: Score Predictions

on:
  schedule:
    # Run daily at 8 PM ET (00:00 UTC next day) — after market close
    # Scores any predictions that have matured (20+ days old)
    - cron: '0 0 * * 2-6'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-score (ignore cache)'
        required: false
        default: 'false'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests numpy pandas scipy arch supabase yfinance

      - name: Score pending predictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -c "
from db import reset_predictions_missing_pnl, score_pending_predictions, get_pending_predictions_count
reset = reset_predictions_missing_pnl()
if reset:
    print(f'Reset {reset} old predictions missing P&L data')
pending = get_pending_predictions_count()
print(f'Pending predictions to check: {pending}')
if pending > 0:
    scored = score_pending_predictions()
    print(f'Scored: {scored}')
else:
    print('Nothing to score yet.')
"
