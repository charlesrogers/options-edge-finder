name: Score Predictions

on:
  schedule:
    # Run daily at 8 PM ET (00:00 UTC next day) — after market close
    # Scores any predictions that have matured (20+ days old)
    - cron: '0 0 * * 2-6'
  workflow_dispatch: {}

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests numpy pandas scipy arch supabase

      - name: Score pending predictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -c "
from db import score_pending_predictions, get_pending_predictions_count
pending = get_pending_predictions_count()
print(f'Pending predictions to check: {pending}')
if pending > 0:
    scored = score_pending_predictions()
    print(f'Scored: {scored}')
else:
    print('Nothing to score yet.')
"
