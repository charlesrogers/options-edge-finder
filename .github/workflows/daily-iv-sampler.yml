name: Daily IV Sampler

on:
  schedule:
    # Run at 11:00 AM and 3:30 PM ET (15:00 and 19:30 UTC) on weekdays
    # 11 AM = after market settles, 3:30 PM = near close for end-of-day snapshot
    - cron: '0 15 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers (leave empty for all defaults)'
        required: false
        type: string

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests numpy pandas scipy arch supabase

      - name: Run batch sampler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            # Convert comma-separated to space-separated
            TICKERS=$(echo "${{ github.event.inputs.tickers }}" | tr ',' ' ')
            python batch_sampler.py $TICKERS
          else
            python batch_sampler.py
          fi
