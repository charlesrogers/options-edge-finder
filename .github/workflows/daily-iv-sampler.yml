name: Daily IV Sampler

on:
  schedule:
    # Run once per day at 3:55 PM ET (19:55 UTC) on weekdays
    # Near close = IV stabilized, tighter spreads, less noise
    - cron: '55 19 * * 1-5'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers (leave empty for all ~350 defaults)'
        required: false
        type: string
      bootstrap:
        description: 'Run bootstrap mode (backfill 90 days of pseudo-IV)'
        required: false
        type: boolean
        default: false

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests numpy pandas scipy arch supabase

      - name: Run batch sampler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.tickers }}" ]; then
              TICKERS=$(echo "${{ github.event.inputs.tickers }}" | tr ',' ' ')
              python batch_sampler.py --bootstrap $TICKERS
            else
              python batch_sampler.py --bootstrap
            fi
          elif [ -n "${{ github.event.inputs.tickers }}" ]; then
            TICKERS=$(echo "${{ github.event.inputs.tickers }}" | tr ',' ' ')
            python batch_sampler.py $TICKERS
          else
            python batch_sampler.py
          fi
